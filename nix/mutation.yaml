# Mutation-plugin config used by every in-repo mutation check
# (mutation-opt-env-conf, mutation-safe-coloured-text,
# mutation-sydtest-mutation-example).
#
# Schema: Test.Syd.Mutation.Plugin.OptParse.MutationPluginConfig.
# Passed to the plugin via '--config=PATH' by sydtest.mutationCheck.

debug: true

# Exercises the 'ignore' filter from sydtest-mutation-example's
# Example.IgnoreLib: 'mark' is a no-op marker, and calls to it must be
# left untouched even when wrapped by '$' (which expands to a typecheck
# 'ExpandedThingTc' node).
ignore:
  - mark
  - markM

# Exercises 'SwitchFunctionArguments' suppression: 'majorityOf5' (in
# Example.ConstFnLib) is symmetric in its arguments, so swapping any two
# produces an equivalent, unkillable mutant.  Listing it here skips the swap
# at every call to it.
operators:
  SwitchFunctionArguments:
    skip-calls-to:
      - majorityOf5
  # Exercises 'ElideCall' suppression: 'same' (in Example.ElideCallLib) is a
  # user-defined identity, so eliding a call to it produces an equivalent,
  # unkillable mutant.  Listing it here skips the elision at every call to it.
  # ('id' is skipped by default and needs no entry.)
  ElideCall:
    skip-calls-to:
      - same
