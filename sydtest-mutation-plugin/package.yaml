name: sydtest-mutation-plugin
version: 0.4.4.0
github: "NorfairKing/sydtest"
license: OtherLicense
license-file: LICENSE.md
author: "Tom Sydney Kerckhove"
maintainer: "syd@cs-syd.eu"
category: Testing

extra-source-files:
- CHANGELOG.md

dependencies:
- base >= 4.7 && < 5

library:
  source-dirs: src
  dependencies:
  - aeson
  - bytestring
  - containers
  - directory
  - filepath
  - ghc
  - ghc-boot
  - mtl
  - opt-env-conf
  - path
  - path-io
  - safe-coloured-text
  - sydtest-mutation-runtime
  - template-haskell
  - text

tests:
  sydtest-mutation-plugin-test:
    main: Spec.hs
    source-dirs: test
    build-tools: sydtest-discover
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - aeson
    - containers
    - ghc
    - opt-env-conf-test
    - path
    - sydtest
    - sydtest-mutation-plugin
    - text
