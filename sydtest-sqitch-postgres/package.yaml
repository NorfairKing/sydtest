name: sydtest-sqitch-postgres
version: 0.0.0.0
github: "NorfairKing/sydtest"
license: OtherLicense
license-file: LICENSE.md
author: "Tom Sydney Kerckhove"
maintainer: "syd@cs-syd.eu"
copyright: "Copyright (c) 2026 Tom Sydney Kerckhove"
category: Testing
synopsis: A sqitch-on-PostgreSQL companion library for sydtest

extra-source-files:
- LICENSE.md
- CHANGELOG.md
- test_resources/**/*

dependencies:
- base >= 4.7 && < 5

library:
  source-dirs: src
  dependencies:
  - bytestring
  - containers
  - monad-logger
  - network-uri
  - path
  - persistent
  - postgres-options
  - sydtest
  - sydtest-persistent-postgresql
  - text
  - tmp-postgres
  - typed-process

tests:
  sydtest-sqitch-postgres-test:
    main: Spec.hs
    source-dirs: test
    build-tools: sydtest-discover
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wall
    dependencies:
    - containers
    - path
    - path-io
    - persistent
    - sydtest
    - sydtest-persistent-postgresql
    - sydtest-sqitch-postgres
    - text
    - unliftio
